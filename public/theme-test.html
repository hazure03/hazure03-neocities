<!DOCTYPE html>
<html lang="en">
<head>
  <title>Example theme switcher</title>
  <meta charset="utf-8">
  <script src="https://cdn.jsdelivr.net/npm/theme-change@2.0.2/index.js"></script>
  <link href="theme-test.css" rel="stylesheet" type="text/css" />
</head>
<body>
<div class="m-5">
	<h2 class="mb-4 text-2xl text-green-700 font-bold">Select</h2>
	<select data-choose-theme>
    <option value="">Default</option>
    <option value="light-green">Cucumber</option>
    <option value="light-gray">Heavenly</option>
  </select>
</div>
</body>
</html>
