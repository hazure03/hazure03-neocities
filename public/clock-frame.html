<!DOCTYPE html>

<head>
    <title>how are you here...?</title>
    <link rel="icon" type="image/x-icon" href="main-assets/main-images/favicon.ico">
    <meta charset="utf-8" />
    <link href="mainstyle.css" rel="stylesheet" type="text/css" />

    <style>
        html {
            font-size:11px;
            padding:0px;
            margin: 0px;
            text-align:right;
            overflow: hidden;
        }

        body {
            padding: 0px;
            margin:0px;
        }
    </style>

    <script language="javascript">
        // Clock Script Generated By Maxx Blade's Clock v2.0
        // http://www.maxxblade.co.uk/clock
        function tS(){ x=new Date(); x.setTime(x.getTime()); return x; } 
        function lZ(x){ return (x>9)?x:'0'+x; } 
        function tH(x){ if(x==0){ x=12; } return (x>12)?x-=12:x; } 
        function aP(x){ return (x>11)?'pm':'am'; } 
        function dT(){ window.status=''+eval(oT)+''; if(fr==0){ fr=1; document.write('<span id="tP">'+eval(oT)+'</span>'); } tP.innerText=eval(oT); setTimeout('dT()',1000); } 
        function y4(x){ return (x<500)?x+1900:x; } 
        var dN=new Array('Sun','Mon','Tue','Wed','Thur','Fri','Sat'),mN=new Array('Jan.','Feb.','Mar.','Apr.','May','Jun.','Jul.','Aug.','Sep.','Oct.','Nov.','Dec.'),
        fr=0,oT="dN[tS().getDay()]+', '+tS().getDate()+' '+mN[tS().getMonth()]+' '+y4(tS().getYear())+' '+'@'+' '+tH(tS().getHours())+':'+lZ(tS().getMinutes())+':'+lZ(tS().getSeconds())+aP(tS().getHours())";
   </script>

</head>
<body>
    <script language="javascript">dT();</script>
</body>
