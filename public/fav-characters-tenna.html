<!DOCTYPE html>
<html>
    <head>
        <title>.*[://haz_FAV-CHARACTERS_TENNA]*.</title>
        <link rel="icon" type="image/x-icon" href="main-assets/main-images/favicon.ico">
        <meta charset="utf-8" />
        <link href="mainstyle.css" rel="stylesheet" type="text/css" />
        <link href="fav-characters-style.css" rel="stylesheet" type="text/css" />
        <link href="tooltip.css" rel="stylesheet" type="text/css" />
        <script src="layout.js"></script>
        <style>

            :root {
                --desc-text: rgb(255, 255, 255);
                --title-text: rgb(247, 238, 74);
                --desc-shadow: rgb(0, 0, 0);
                --title-shadow: rgb(0, 0, 0);
                --desc-bg: rgb(0, 0, 0);
                --accent-color: rgb(255, 255, 255);
            }

            @font-face {
                font-family: 'AccentFont'; /*a name to be used later*/
                src: url(fav-characters-fonts/undertale-deltarune-text-font-extended.otf.woff2); /*URL to font*/
            }

            .maincontent {
                background-image: url(images/fav-characters/tenna-bg.webp);
                background-size: cover;
                font-family: 'AccentFont';
                
            }

            .title {
                font-family: 'AccentFont';
                text-shadow: var(--title-shadow) 0px 0px 10px;
                color: var(--title-text);
                font-size:35px;
            }

            .character-table {
                background-size: cover;
                background-position: top;
                color: var(--desc-text)
            }

             .main-pic img{
                width:140%;
                object-position:left;
                margin-left: -50px;
                transform: scaleX(-1);
            }

            .character-table td {
                border:0px dashed rgba(245, 245, 220, 0.307);
            }

            .character-quote p{
                font-family: 'AccentFont';
                font-size:18px;
                color: var(--title-text);
                text-shadow: var(--title-shadow) 0px 0px 10px;
            }

            .character-desc p {
                color: var(--desc-text);
                text-shadow: var(--desc-shadow) 0px 0px 10px;
            }

            .character-desc-bg {
                mask-image: url("images/masks/mask-08.png");
                background-color: var(--desc-bg);
            }

            h3 {
                font-family: 'AccentFont';
                font-size:20px;
                color: var(--title-text);
                text-shadow: var(--title-shadow) 0px 0px 10px;
            }

            .divider {
                border: 1px dashed var(--accent-color);
            }
        

        </style>
    </head>
<body>
    <img src="images/fav-characters/flutter-pic6.webp" class="pagedoll">
    <div class="maincontent">
        
        <div class="subpage-header">
            <img src="main-assets/main-icons/arrowleft.gif"><a href="/fav-characters.html" style="color:purple;">Go Back</a>
        </div>

        <table class="character-table">
            <tr class="top-row">
                <td class="main-pic">
                    <img src="images/fav-characters/tenna_battle.gif">
                </td>
                <td class="character-desc">
                    <div class="character-desc-bg"></div>
                    <div class="desc-text">
                        <div class="title">Mr. "Ant" Tenna</div>
                        <p>Descriptiooon</p>
                    </div>
                </td>
            </tr>
            <tr>
                <td class="character-quote" colspan="2">
                    <div class="divider"></div>
                    <p>' ' HD's nothing when you got NOSTALGIA! ' '</p>
                    <div class="stamps">
                        <img src="images/fav-characters/flutter-stamp1.png">
                        <img src="images/fav-characters/flutter-stamp2.png">
                        <img src="images/fav-characters/flutter-stamp3.png">
                        <img src="images/fav-characters/flutter-stamp4.png">
                    </div>
                    <div class="divider"></div>
                </td>
            </tr>
            <tr>
                <td class="character-pics" colspan="2">
                    <h3>Gallery</h3>
                    <div class="pic-with-comment">
                        <img src="images/fav-characters/flutter-pic1.webp">
                        <p>Flutter's model in-game</p>
                    </div>
                    <div class="pic-with-comment">
                        <img src="images/fav-characters/flutter-pic2.webp">
                        <p>In-game ":D" sticker</p>
                    </div>
                    <div class="pic-with-comment">
                        <img src="images/fav-characters/flutter-pic3.webp">
                        <p>In-game painting</p>
                    </div>
                    <div class="pic-with-comment">
                        <img src="images/fav-characters/flutter-pic4.webp">
                        <p>Flutter's initial concept art</p>
                    </div>
                    <div class="pic-with-comment">
                        <img src="images/fav-characters/flutter-pic5.webp">
                        <p>Flutter's "twisted" form</p>
                    </div>
                </td>
            </tr>
        </table>
    </div>
</body>
</html>
